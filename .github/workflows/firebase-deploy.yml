name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -e -x
          # Write service account
          echo "--- Writing service account ---"
          echo "$SA" > /tmp/sa.json

          # Install firebase-tools
          echo "--- Installing firebase-tools ---"
          npm install -g firebase-tools 2>&1

          # Explicitly set auth
          echo "--- Setting up auth ---"
          export CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json

          # Verify
          echo "--- Checking project ---"
          npx firebase-tools projects:list --non-interactive 2>&1 || echo "list failed"

          # Deploy
          echo "--- Deploying rules ---"
          npx firebase-tools deploy --only firestore --project pepe-2026 --non-interactive 2>&1
