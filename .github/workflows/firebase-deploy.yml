name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy
        run: |
          set -e
          npm install -g firebase-tools@latest > /dev/null 2>&1
          export FIREBASE_TOKEN=$(gcloud auth print-access-token --project=pepe-2026)
          firebase deploy --only firestore --project pepe-2026 --non-interactive 2>&1 || echo "EXIT_CODE=$?"
