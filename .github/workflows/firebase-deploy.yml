name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -e
          # Write service account using base64 to preserve formatting
          echo "$SA" | node -e "
            const fs = require('fs');
            const sa = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            fs.writeFileSync('/tmp/sa.json', JSON.stringify(sa));
            console.log('SA OK:', sa.client_email);
          "

          # Install firebase-tools
          npm install -g firebase-tools 2>&1 | tail -1

          # Deploy using ADC
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npx firebase-tools deploy --only firestore --project pepe-2026 --non-interactive 2>&1
