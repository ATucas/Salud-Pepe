name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy
        run: |
          set -e
          echo "--- Verifying gcloud ---"
          gcloud auth list --format=json | head -5
          gcloud config get-value project

          echo "--- Getting token ---"
          TOKEN=$(gcloud auth print-access-token)
          echo "Token: ${TOKEN:0:20}..."

          echo "--- Installing firebase-tools ---"
          npm install -g firebase-tools@latest 2>&1 | tail -3

          echo "--- Which firebase ---"
          which firebase || echo "not found"
          npx --yes firebase-tools --version

          echo "--- Deploying rules ---"
          npx --yes firebase-tools deploy --only firestore --project pepe-2026 --non-interactive --token "$TOKEN" 2>&1
          echo "EXIT CODE: $?"
